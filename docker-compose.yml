# ==========================================
# FOOD DASH - Docker Compose Configuration
# Deploys: Node.js + Python + MongoDB + Redis
# Usage: docker-compose up
# ==========================================

version: "3.9"

services:
  # ==========================================
  # MongoDB Database
  # ==========================================
  mongodb:
    image: mongo:7.0-alpine
    container_name: food-dash-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: food_dash
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - food-dash-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Redis Cache & Queue
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: food-dash-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    networks:
      - food-dash-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # FOOD DASH Application
  # (Node.js Backend + Python OpenEnv)
  # ==========================================
  food-dash:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: food-dash-app
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      # Node.js Backend API
      - "5000:5000"
      # Python OpenEnv API
      - "8000:8000"
      # Frontend (served from backend)
      - "80:5000"
    environment:
      # ============ Node.js ============
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      
      # ============ Database ============
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-password}@mongodb:27017/food_dash?authSource=admin
      
      # ============ Redis ============
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
      
      # ============ JWT & Auth ============
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_here_min_32_chars_change_me}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      
      # ============ Google OAuth ============
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-your_google_client_id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-your_google_client_secret}
      
      # ============ Razorpay Payments ============
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-your_razorpay_key}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-your_razorpay_secret}
      
      # ============ OpenAI ============
      OPENAI_API_KEY: ${OPENAI_API_KEY:-your_openai_api_key}
      
      # ============ Python/OpenEnv ============
      PYTHON_PORT: 8000
      NODE_API_URL: http://localhost:5000
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      
      # ============ Email ============
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-your_email@gmail.com}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-your_app_password}
      
      # ============ Logging ============
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: ./server/logs
      
    volumes:
      - ./server:/app/server
      - ./openenv:/app/openenv
      - ./client:/app/client
      - ./api.py:/app/api.py
      - ./inference.py:/app/inference.py
      - ./openenv.yaml:/app/openenv.yaml
      - ./requirements.txt:/app/requirements.txt
      - app_logs:/app/server/logs
    networks:
      - food-dash-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/api/health" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 50s

# ==========================================
# Volumes
# ==========================================
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local

# ==========================================
# Networks
# ==========================================
networks:
  food-dash-network:
    driver: bridge
